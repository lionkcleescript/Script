<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Script - Lion Kc Lee Hub</title>
    <!-- Bộ icon chuyên nghiệp -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-card: #151c24;
            --accent: #45f3ff;
            --text-light: #ffffff;
            --text-muted: #8892b0;
            --success: #2ed573;
            --danger: #ff4757;
        }
        body { 
            background-color: var(--bg-main); 
            color: var(--text-light); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 15px; 
        }
        .container { 
            max-width: 680px; 
            margin: 10px auto; 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #2a3543; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .back-link { 
            display: inline-block; 
            margin-bottom: 15px; 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 500; 
        }
        /* Khung chứa video chuẩn 16:9 */
        .video-container { 
            position: relative; 
            width: 100%; 
            padding-bottom: 56.25%; 
            height: 0; 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #2a3543; 
            margin-bottom: 20px;
        }
        .video-container iframe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; 
        }
        h1 { 
            color: var(--text-light); 
            font-size: 1.5rem; 
            margin: 0 0 10px 0; 
            line-height: 1.4;
        }
        h1 span { color: var(--accent); }
        .meta-info { 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #2a3543; 
            padding-bottom: 10px; 
        }
        .features-box {
            background-color: #0b0c10;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1f2833;
            margin-bottom: 20px;
        }
        .features-box h3 { margin-top: 0; color: var(--accent); font-size: 1.1rem; }
        .features-box ul { margin: 0; padding-left: 20px; color: var(--text-muted); line-height: 1.6; }
        
        /* Khu vực hiển thị quảng cáo Banner thực tế */
        .ads-container { 
            text-align: center; 
            margin: 20px 0; 
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Hệ thống nút bấm */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }
        .btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #0b0c10; 
            text-decoration: none; 
            padding: 14px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            border: none; 
            font-size: 1rem; 
            transition: 0.3s; 
        }
        .btn-linkvertise {
            background-color: var(--danger);
            color: white;
        }
        .btn-linkvertise:disabled {
            background-color: #3a4454;
            color: var(--text-muted);
            cursor: not-allowed;
        }
        .btn:hover:not(:disabled) { 
            background: #ffffff; 
            color: #0b0c10; 
            box-shadow: 0 0 15px #ffffff; 
        }
    </style>

    <!-- VỊ TRÍ 1: MÃ QUẢNG CÁO NHẢY TAB (POP-UNDER) HOẶC ANTI-ADBLOCK -->
    <!-- Khi lấy được mã Popunder từ Monetag/Adsterra, bạn copy toàn bộ dán ngay phía dưới dòng này -->

</head>
<body>

<div class="container">
    <!-- Nút quay lại -->
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại Trang Chủ</a>
    
    <!-- VIDEO YOUTUBE CỦA SCRIPT -->
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/80KzF8c9dHQ" allowfullscreen></iframe>
    </div>
    
    <!-- TIÊU ĐỀ -->
    <h1>[OP] <span>Best script Animal hospital</span> - top 3 best script Auto Visitor, Auto treatment, No key</h1>
    <div class="meta-info">
        <i class="fa-solid fa-user"></i> By Lion Kc Lee • <i class="fa-solid fa-circle-check" style="color: var(--success);"></i> Verified Safe
    </div>

    <!-- VỊ TRÍ 2: QUẢNG CÁO BANNER ĐẦU TRANG -->
    <div class="ads-container">
        <!-- Xóa dòng chữ dưới và dán đoạn mã Banner (Native Banner/728x90) của bạn vào đây -->
        <span style="color:var(--text-muted); border: 1px dashed var(--accent); padding: 15px; border-radius: 8px;">[Quảng cáo Banner Đầu Trang]</span>
    </div>

    <!-- CHỨC NĂNG SCRIPT -->
    <div class="features-box">
        <h3><i class="fa-solid fa-list-check"></i> Tính năng chính:</h3>
        <ul>
            <li>Auto Farm.</li>
            <li>inf sanity.</li>
            <li>auto visitor.</li>
            <li>auto treatment.</li>
        </ul>
    </div>

    <!-- VỊ TRÍ 3: QUẢNG CÁO BANNER GIỮA TRANG -->
    <div class="ads-container">
        <!-- Xóa dòng chữ dưới và dán đoạn mã Banner (Native Banner/300x250) của bạn vào đây -->
        <span style="color:var(--text-muted); border: 1px dashed var(--accent); padding: 15px; border-radius: 8px;">[Quảng cáo Banner Giữa Trang]</span>
    </div>

    <!-- HỆ THỐNG NÚT BẤM VƯỢT LINK -->
    <div class="btn-group">
        <button class="btn btn-linkvertise" id="redirectBtn" onclick="goToLink('https://direct-link.net/1340562/u0MvnypcWBm5')" disabled>
            <i class="fa-solid fa-hourglass-half"></i> Vui lòng chờ <span id="countdown">10</span> giây...
        </button>
    </div>
</div>

<!-- ĐOẠN XỬ LÝ HỆ THỐNG ĐẾM GIỜ CHẠY TỰ ĐỘNG -->
<script>
    let seconds = 10;
    const countdownEl = document.getElementById('countdown');
    const redirectBtn = document.getElementById('redirectBtn');
    
    const timer = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
            clearInterval(timer);
            redirectBtn.disabled = false;
            redirectBtn.innerHTML = '<i class="fa-solid fa-link"></i> LINK SCRIPT';
        } else {
            countdownEl.innerText = seconds;
        }
    }, 1000);

    function goToLink(url) {
        if(url === 'ĐIỀN_LINK_RÚT_GỌN_CỦA_BẠN') {
            alert('Bạn chưa cài đặt link rút gọn trong mã nguồn GitHub!');
        } else {
            // VỊ TRÍ 4: KIẾM TIỀN MẸO (SMARTLINK)
            // Bạn có thể chèn mã Smartlink mở kèm tại đây để tăng tối đa doanh thu khi họ bấm nút
            window.open(url, '_blank');
        }
    }
</script>

</body>
